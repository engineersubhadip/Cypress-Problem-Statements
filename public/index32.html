<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Every Element Has HREF Link</title>
	</head>
	<body>
		<ul>
			<li>apples</li>
			<li data-product href="https://acme.co">pears</li>
			<li data-price="199" href="https://acme.co/buy">grapes</li>
			<li>kiwi</li>
			<li data-cy="recent" href="https://acme.co/recent-items">melons</li>
		</ul>
	</body>
</html>
