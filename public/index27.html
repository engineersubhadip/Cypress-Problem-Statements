<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sorted by discount price</title>
	</head>
	<body>
		<ol id="fruits">
			<li>Oranges <span class="price">$0.99</span></li>
			<li>Mango <span class="price">$1.01</span></li>
			<li>
				Tomatoes
				<span class="price"
					><span class="old-price">$2.70</span> <span>$2.19</span></span
				>
			</li>
			<li>
				Potatoes
				<span class="price"
					><span class="old-price">$3.00</span> <span>$2.50</span></span
				>
			</li>
			<li>Bananas <span class="price">$2.99</span></li>
		</ol>

		<style>
			.price {
				font-weight: bolder;
			}
			.price .old-price {
				font-weight: 100;
				text-decoration: line-through;
			}
		</style>
	</body>
</html>
