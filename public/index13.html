<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table loading in async fashion...</title>
  </head>
  <body>
    <style>
      table td {
        border: 3px solid black;
      }
    </style>
    <table>
      <tbody></tbody>
    </table>
    <script>
      // the first two rows appear after one second
      // and the remaining rows appear after two seconds
      setTimeout(function () {
        document.querySelector("table tbody").innerHTML = `
      <tr><td>First row</td></tr>
      <tr><td>Row 2</td></tr>
    `;
      }, 1000);
      setTimeout(function () {
        document.querySelector("table tbody").innerHTML += `
      <tr><td>Row 3</td></tr>
      <tr><td>Row 4</td></tr>
      <tr><td>Row 5</td></tr>
    `;
      }, 2000);
    </script>
  </body>
</html>
